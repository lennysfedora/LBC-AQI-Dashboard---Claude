/* Weighted composite across every source that reported and counts. */
function composite(readings) {
  const used = SOURCES.filter(
    (s) => s.counts && readings[s.id] && typeof readings[s.id].aqi === "number"
  );
  if (used.length === 0) return null;

  const totalW = used.reduce((sum, s) => sum + s.weight, 0);
  const value = used.reduce((sum, s) => sum + readings[s.id].aqi * s.weight, 0) / totalW;

  const values = used.map((s) => readings[s.id].aqi);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const spread = max - min;
  const hasRegulatory = used.some((s) => s.tag === "Regulatory");

  let confidence;
  if (!hasRegulatory) confidence = "Low — no ground monitor reporting";
  else if (used.length < 2) confidence = "Low — single source";
  else if (spread <= 20) confidence = "High — sources agree closely";
  else if (spread <= 50) confidence = "Moderate — sources differ";
  else confidence = "Low — sources disagree sharply";

  return { value: Math.round(value), min, max, spread, count: used.length, confidence, totalW };
}

/* Background tint: the colour smoke-filtered daylight actually takes on. */
function formatRefreshedAt(d) {
  if (!d) return null;
  const datePart = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  const timePart = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  let tz = "";
  try {
    tz = new Intl.DateTimeFormat(undefined, { timeZoneName: "short" })
      .formatToParts(d)
      .find((p) => p.type === "timeZoneName")?.value || "";
  } catch (e) {}
  return `${datePart}, ${timePart}${tz ? ` ${tz}` : ""}`;
}

/* Finds the first balanced {...} object in text, tracking string state so that
   braces inside quoted strings don't confuse depth counting. Far more robust
   than indexOf/lastIndexOf, which breaks the instant any stray "}" appears

/* ------------------------------------------------------------------ *
 * DIRECT-API REFRESH — standalone-HTML version only.
 *
 * This file no longer asks an AI to search the web and summarize. It calls
 * six real public data APIs directly from the browser, which is why this
 * page works with no dependency on Claude.ai at all. Three need a free key
 * you register yourself; three need nothing.
 *
 *   AQICN (aqicn)      — free token:  https://aqicn.org/data-platform/token/
 *   PurpleAir          — free key:    https://develop.purpleair.com  (Keys tab, "Read" key)
 *   IQAir              — free key:    https://www.iqair.com/air-pollution-data-api
 *   Open-Meteo         — no signup required
 *   National Weather Service — no signup required (U.S. government API)
 *
 * Paste your three keys below. Leave any blank and that source is simply
 * skipped on refresh — same "omit rather than guess" rule as everywhere
 * else on this page.
 * ------------------------------------------------------------------ */
const AQICN_TOKEN = "";     // https://aqicn.org/data-platform/token/
const PURPLEAIR_KEY = "";   // https://develop.purpleair.com
const IQAIR_KEY = "";       // https://www.iqair.com/air-pollution-data-api

const CAMP_LAT = 44.5570;   // Cove Palisades State Park
const CAMP_LON = -121.2668;

/* ---- Pure helpers ---- */

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

/* Standard EPA PM2.5 -> AQI breakpoint table. */
function pm25ToAqi(pm) {
  if (pm < 0) return 0;
  const bp = [
    [0.0, 9.0, 0, 50],
    [9.1, 35.4, 51, 100],
    [35.5, 55.4, 101, 150],
    [55.5, 125.4, 151, 200],
    [125.5, 225.4, 201, 300],
    [225.5, 325.4, 301, 500],
  ];
  for (const [cLo, cHi, iLo, iHi] of bp) {
    if (pm >= cLo && pm <= cHi) return Math.round(((iHi - iLo) / (cHi - cLo)) * (pm - cLo) + iLo);
  }
  return 500; // above table range — report the ceiling rather than extrapolate past what's validated
}

/* EPA/Barkjohn (2021) wildfire-smoke correction for raw PurpleAir CF=1 PM2.5.
   Published coefficients — this is the same correction EPA applies on the
   AirNow Fire and Smoke Map. Validated up to ~250 ug/m3 raw; clamped above that. */
function purpleAirEpaCorrection(pmCf1, rh) {
  const rhSafe = typeof rh === "number" ? rh : 50;
  const corrected = 0.524 * Math.min(pmCf1, 250) - 0.0862 * rhSafe + 5.75;
  return Math.max(0, corrected);
}

function degToCompass(deg) {
  if (typeof deg !== "number") return null;
  const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}

/* WMO weather codes (used by Open-Meteo). Compact — covers what matters here. */
function wmoWeatherText(code) {
  const map = {
    0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
    45: "Fog", 48: "Depositing rime fog",
    51: "Light drizzle", 53: "Drizzle", 55: "Dense drizzle",
    61: "Light rain", 63: "Rain", 65: "Heavy rain",
    71: "Light snow", 73: "Snow", 75: "Heavy snow",
    80: "Rain showers", 81: "Rain showers", 82: "Violent rain showers",
    95: "Thunderstorm", 96: "Thunderstorm with hail", 99: "Thunderstorm with heavy hail",
  };
  return { text: map[code] || "Unknown", isThunderstorm: code >= 95 };
}

function dayKey(dateObj) {
  return dateObj.toISOString().slice(0, 10); // YYYY-MM-DD, for matching across API responses
}
function dayLabel(dateObj) {
  return {
    day: dateObj.toLocaleDateString(undefined, { weekday: "short" }),
    date: dateObj.toLocaleDateString(undefined, { month: "short", day: "numeric" }),
  };
}

/* ---- Live fetchers. Each is self-contained: any failure (missing key,
   network error, no nearby sensor) resolves to null rather than throwing,
   so one bad source never blocks the others. ---- */

async function fetchAqicn() {
  if (!AQICN_TOKEN) return null;
  try {
    const res = await fetch(`https://api.waqi.info/feed/geo:${CAMP_LAT};${CAMP_LON}/?token=${AQICN_TOKEN}`);
    const j = await res.json();
    if (j.status !== "ok" || typeof j.data?.aqi !== "number") return null;
    const pm25 = j.data.iaqi?.pm25?.v ?? null;
    const ts = j.data.time?.s ? new Date(j.data.time.s.replace(" ", "T")) : new Date();
    return {
      aqi: Math.round(j.data.aqi),
      pm25: typeof pm25 === "number" ? pm25 : null,
      updatedLabel: ts.toLocaleString(undefined, { hour: "numeric", minute: "2-digit", month: "short", day: "numeric" }),
      recent: null,
    };
  } catch (e) {
    return null;
  }
}

async function fetchPurpleAir() {
  if (!PURPLEAIR_KEY) return null;
  try {
    const pad = 0.15; // ~15km box
    const url =
      `https://api.purpleair.com/v1/sensors?fields=latitude,longitude,pm2.5_cf_1,humidity,last_seen` +
      `&location_type=0&nwlat=${CAMP_LAT + pad}&nwlng=${CAMP_LON - pad}&selat=${CAMP_LAT - pad}&selng=${CAMP_LON + pad}`;
    const res = await fetch(url, { headers: { "X-API-Key": PURPLEAIR_KEY } });
    const j = await res.json();
    if (!Array.isArray(j.data) || j.data.length === 0) return null;

    const idx = Object.fromEntries(j.fields.map((f, i) => [f, i]));
    let nearest = null, nearestDist = Infinity;
    for (const row of j.data) {
      const lat = row[idx.latitude], lon = row[idx.longitude];
      if (typeof lat !== "number" || typeof lon !== "number") continue;
      const d = haversineKm(CAMP_LAT, CAMP_LON, lat, lon);
      if (d < nearestDist) { nearestDist = d; nearest = row; }
    }
    if (!nearest) return null;

    const pmCf1 = nearest[idx["pm2.5_cf_1"]];
    const rh = nearest[idx.humidity];
    const lastSeen = nearest[idx.last_seen];
    if (typeof pmCf1 !== "number") return null;

    const correctedPm = purpleAirEpaCorrection(pmCf1, rh);
    return {
      aqi: pm25ToAqi(correctedPm),
      pm25: Math.round(correctedPm * 10) / 10,
      updatedLabel:
        (lastSeen ? new Date(lastSeen * 1000).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" }) : "just now") +
        ` · ${nearestDist.toFixed(1)} km away`,
      recent: null,
    };
  } catch (e) {
    return null;
  }
}

async function fetchIqair() {
  if (!IQAIR_KEY) return null;
  try {
    const res = await fetch(`https://api.airvisual.com/v2/nearest_city?lat=${CAMP_LAT}&lon=${CAMP_LON}&key=${IQAIR_KEY}`);
    const j = await res.json();
    if (j.status !== "success") return null;
    const pol = j.data?.current?.pollution;
    if (!pol || typeof pol.aqius !== "number") return null;
    return {
      aqi: Math.round(pol.aqius),
      pm25: null, // AirVisual's free tier returns AQI directly, not raw concentration
      updatedLabel: pol.ts ? new Date(pol.ts).toLocaleString(undefined, { hour: "numeric", minute: "2-digit", month: "short", day: "numeric" }) : "just now",
      recent: null,
    };
  } catch (e) {
    return null;
  }
}

async function fetchOpenMeteoAir() {
  try {
    const url =
      `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${CAMP_LAT}&longitude=${CAMP_LON}` +
      `&current=us_aqi,pm2_5&hourly=us_aqi&past_hours=7&forecast_days=5&timezone=auto`;
    const res = await fetch(url);
    const j = await res.json();
    if (!j.current || typeof j.current.us_aqi !== "number") return null;

    let recent = null;
    if (j.hourly?.us_aqi) {
      recent = j.hourly.us_aqi.slice(0, 8).filter((n) => typeof n === "number");
      if (recent.length < 2) recent = null;
    }

    const reading = {
      aqi: Math.round(j.current.us_aqi),
      pm25: typeof j.current.pm2_5 === "number" ? j.current.pm2_5 : null,
      updatedLabel: j.current.time
        ? new Date(j.current.time).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })
        : "just now",
      recent,
    };

    // Daily max AQI per day, keyed by date, skipping today (index 0) — for the "Through Sunday" panel.
    const forecastAqi = {};
    if (j.hourly?.time && j.hourly?.us_aqi) {
      const todayKey = dayKey(new Date());
      j.hourly.time.forEach((t, i) => {
        const key = t.slice(0, 10);
        if (key === todayKey) return; // skip today, matches "Through Sunday" framing
        const v = j.hourly.us_aqi[i];
        if (typeof v === "number") forecastAqi[key] = Math.max(forecastAqi[key] ?? 0, v);
      });
    }

    return { reading, forecastAqi };
  } catch (e) {
    return null;
  }
}

async function fetchOpenMeteoWeather() {
  try {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${CAMP_LAT}&longitude=${CAMP_LON}` +
      `&current=temperature_2m,wind_speed_10m,wind_direction_10m,relative_humidity_2m,precipitation,weather_code` +
      `&daily=temperature_2m_max,temperature_2m_min,weather_code` +
      `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=5`;
    const res = await fetch(url);
    const j = await res.json();
    if (!j.current) return null;

    const forecastDaily = {};
    if (j.daily?.time) {
      const todayKey = j.daily.time[0]; // Open-Meteo daily.time[0] is always today
      j.daily.time.forEach((t, i) => {
        if (t === todayKey) return; // skip today
        forecastDaily[t] = {
          hi: typeof j.daily.temperature_2m_max?.[i] === "number" ? Math.round(j.daily.temperature_2m_max[i]) : null,
          lo: typeof j.daily.temperature_2m_min?.[i] === "number" ? Math.round(j.daily.temperature_2m_min[i]) : null,
          sky: typeof j.daily.weather_code?.[i] === "number" ? wmoWeatherText(j.daily.weather_code[i]).text : null,
        };
      });
    }

    return {
      tempF: typeof j.current.temperature_2m === "number" ? Math.round(j.current.temperature_2m) : null,
      sky: typeof j.current.weather_code === "number" ? wmoWeatherText(j.current.weather_code) : null,
      forecastDaily,
    };
  } catch (e) {
    return null;
  }
}

async function fetchNws() {
  try {
    const stationsRes = await fetch(`https://api.weather.gov/points/${CAMP_LAT},${CAMP_LON}/stations`);
    const stationsJson = await stationsRes.json();
    const stationUrl = stationsJson.features?.[0]?.id;
    let obs = null;
    if (stationUrl) {
      const obsRes = await fetch(`${stationUrl}/observations/latest`);
      const obsJson = await obsRes.json();
      obs = obsJson.properties || null;
    }

    const alertsRes = await fetch(`https://api.weather.gov/alerts/active?point=${CAMP_LAT},${CAMP_LON}`);
    const alertsJson = await alertsRes.json();
    const alerts = (alertsJson.features || [])
      .map((f) => f.properties?.headline)
      .filter(Boolean);
    const lightning = (alertsJson.features || []).some((f) => {
      const ev = (f.properties?.event || "").toLowerCase();
      return ev.includes("thunderstorm") || ev.includes("tornado");
    });

    if (!obs) return { alerts, lightning, tempF: null, windMph: null, windDir: null, humidity: null, conditions: null, precip: null };

    const tempF = typeof obs.temperature?.value === "number" ? Math.round(obs.temperature.value * 9 / 5 + 32) : null;
    const windMph = typeof obs.windSpeed?.value === "number" ? Math.round(obs.windSpeed.value * 0.621371) : null;
    const windDir = degToCompass(obs.windDirection?.value);
    const humidity = typeof obs.relativeHumidity?.value === "number" ? Math.round(obs.relativeHumidity.value) : null;
    const conditions = obs.textDescription || null;
    const precip = obs.precipitationLastHour?.value > 0 ? "Precipitation in the last hour" : null;

    return { tempF, windMph, windDir, humidity, conditions, precip, alerts, lightning };
  } catch (e) {
    return null;
  }
}

function airTint(aqi) {
  const t = Math.min(aqi, 320) / 320;
  const l = (a, b) => Math.round(a + (b - a) * t);
  return {
    background: `radial-gradient(ellipse 120% 80% at 50% 0%, rgb(${l(233,190)},${l(232,150)},${l(223,108)}) 0%, rgb(${l(214,150)},${l(212,112)},${l(199,74)}) 100%)`,
  };
}

/* Small sparkline. Renders nothing rather than inventing a shape. */
function Spark({ series, color }) {
  if (!Array.isArray(series) || series.length < 2) return null;
  const w = 132, h = 34, pad = 3;
  const max = Math.max(...series, 1);
  const min = Math.min(...series);
  const range = Math.max(max - min, 1);
  const pts = series
    .map((v, i) => {
      const x = pad + (i / (series.length - 1)) * (w - pad * 2);
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    })
    .join(" ");
  return (
    <svg width={w} height={h} role="img" aria-label={`Recent trend, ${min} to ${max}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.75" strokeLinejoin="round" strokeLinecap="round" />
      <circle
        cx={pad + (w - pad * 2)}
        cy={h - pad - ((series[series.length - 1] - min) / range) * (h - pad * 2)}
        r="2.6"
        fill={color}
      />
    </svg>
  );
}

      // transient network blip), not a failure that should also block weather/temp/forecast, all

          aqi: typeof aqi === "number" ? Math.round(aqi) : null,
          hi: wx?.hi ?? null,
          lo: wx?.lo ?? null,
          sky: wx?.sky ?? null,
          flag: typeof aqi === "number" ? null : "no forecast published",

      const tempF = nwsR?.tempF ?? openWxR?.tempF ?? null;

            >
              <span className="text-[11px] uppercase" style={sectionLabel}>How the composite is calculated</span>
              <span aria-hidden="true" className="text-lg leading-none transition-transform duration-200" style={{ transform: showMethod ? "rotate(45deg)" : "none", opacity: 0.5 }}>+</span>
            </button>
            {showMethod && (
              <div className="px-4 pb-4 text-[13px] leading-relaxed">
                <p>
                  Each source carries a fixed weight set by how it measures and how close it sits to the site:
                  regulatory ground monitors at the top, blended monitor-plus-sensor maps just below, corrected
                  crowdsourced sensors in the middle, satellite models low, and global weather-app models lowest.
                  The headline number is the weighted mean of every source that reported.
                </p>
                <p className="pt-2.5">
                  Two feeds are marked reference only and excluded from the average: the Oregon DEQ map and aqicn both
                  republish the same AirNow instruments, and counting them would triple-weight one measurement while
                  making the sources look more unanimous than they are.
                </p>
                <p className="pt-2.5">
                  Confidence comes from the spread between sources and whether a regulatory monitor is among them. Wide
                  disagreement or no ground instrument reporting both push it down. A tight range with a real monitor in
                  the mix is the only way it reads High.
                </p>
                <p className="pt-2.5 opacity-75">
                  What this can't fix: every source describes somewhere other than your campsite, and averaging distant
                  readings doesn't make them local. Treat the composite as a better estimate than any single number,
                  not as a measurement of the air you'll be breathing.
                </p>
              </div>
            )}
          </div>
        </section>

        {/* Through Sunday */}
        {data.forecast?.length > 0 && (
          <section className="mt-9">
            <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>Through Sunday</h2>
            <div className="mt-3 space-y-2.5">
              {data.forecast.map((f) => (
                <div key={f.day} className="flex items-center gap-3">
                  <div className="w-14 shrink-0">
                    <p className="text-sm uppercase leading-none" style={mono}>{f.day}</p>
                    {f.date && <p className="pt-0.5 text-[10px] leading-none opacity-55" style={mono}>{f.date}</p>}
                  </div>

                  <div className="h-5 flex-1 overflow-hidden rounded-[2px]" style={{ backgroundColor: "rgba(34,31,26,0.1)" }}>
                    {f.aqi != null ? (
                      <div
                        className="h-full transition-all duration-700"
                        style={{ width: `${Math.min(f.aqi, 500) / 5}%`, backgroundColor: bandFor(f.aqi).color }}
                      />
                    ) : (
                      <div
                        className="h-full w-full"
                        style={{
                          backgroundImage:
                            "repeating-linear-gradient(45deg, rgba(34,31,26,0.09) 0 5px, transparent 5px 10px)",
                        }}
                      />
                    )}
                  </div>

                  <div className="w-[4.5rem] shrink-0 text-right">
                    <p className="leading-none tabular-nums" style={{ ...cond, fontWeight: 600, fontSize: "1.2rem" }}>
                      {f.aqi != null ? f.aqi : "—"}
                    </p>
                    <p className="pt-1 text-[11px] leading-none tabular-nums opacity-70" style={mono}>
                      {f.hi != null || f.lo != null
                        ? `${f.hi != null ? `${f.hi}°` : "–"}/${f.lo != null ? `${f.lo}°` : "–"}`
                        : "—"}
                    </p>
                    {f.sky && <p className="pt-1 text-[10px] leading-none opacity-55">{f.sky}</p>}
                  </div>
                </div>
              ))}
            </div>

            <p className="pt-3 text-xs leading-relaxed opacity-70">
              Highs and lows in °F. Daily AQI figures hide a nightly rebound — smoke thins for a few hours before
              dawn, then rebuilds, so the average flatters the day. Saturday's number comes from a partial hourly
              run that cuts off at midday, and no AQI forecast has been published for Sunday yet.
            </p>
          </section>
        )}

        {/* Assessment */}
        <section className="mt-10">
          <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>Assessment</h2>

          <div className="mt-3 rounded-[2px] p-4" style={{ ...card, borderLeft: `3px solid ${band.color}` }}>
            <div className="flex flex-wrap items-center gap-2">
              <span
                className="rounded-[2px] px-2 py-0.5 text-[10px] uppercase tracking-[0.14em]"
                style={{ ...mono, border: `1px solid ${band.color}`, color: band.color === "#DCC04A" ? "#8A7318" : band.color }}
              >
                {rec.call}
              </span>
              <span className="text-[10px] uppercase tracking-[0.14em] opacity-55" style={mono}>
                suggested call at {comp ? comp.value : "—"} AQI
              </span>
            </div>
            <p className="pt-2.5 text-sm font-medium leading-relaxed">{rec.verdict}</p>
            <p className="pt-2 text-sm leading-relaxed">{rec.reasoning}</p>
          </div>

          <div className="mt-3 grid gap-3 sm:grid-cols-5">
            <div className="rounded-[2px] p-4 sm:col-span-3" style={card}>
              <h3 className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Precautions on site</h3>
              <ul className="mt-2 space-y-2">
                {rec.ifYouGo.map((item, i) => (
                  <li key={i} className="flex gap-2 text-[13px] leading-relaxed">
                    <span aria-hidden="true" className="pt-[7px]">
                      <span className="block h-[4px] w-[4px] rounded-full" style={{ backgroundColor: band.color }} />
                    </span>
                    <span>{item}</span>
                  </li>
                ))}
              </ul>
            </div>

            <div className="rounded-[2px] p-4 sm:col-span-2" style={card}>
              <h3 className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>What would change this</h3>
              <p className="mt-2 text-[13px] leading-relaxed">{rec.wouldChange}</p>
              <p className="pt-3 text-xs leading-relaxed opacity-65">
                A judgement drawn from the composite above, not a reading off an instrument. The reasoning is laid out
                so it can be argued with on specifics.
              </p>
            </div>
          </div>
        </section>

        {/* Symptom monitoring */}
        <section className="mt-10">
          <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>What to watch for</h2>
          <div className="mt-3 grid gap-3 sm:grid-cols-2">
            {WATCH.map((group) => (
              <div key={group.who} className="rounded-[2px] p-4" style={card}>
                <h3 className="uppercase leading-none" style={{ ...cond, fontWeight: 600, fontSize: "1.1rem" }}>{group.who}</h3>
                <p className="pt-3 text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Early signs</p>
                <ul className="mt-1.5 space-y-1.5">
                  {group.early.map((s, i) => (
                    <li key={i} className="flex gap-2 text-[13px] leading-relaxed">
                      <span aria-hidden="true" className="pt-[7px]"><span className="block h-[4px] w-[4px] rounded-full" style={{ backgroundColor: "#DF8A3C" }} /></span>
                      <span>{s}</span>
                    </li>
                  ))}
                </ul>
                <p className="pt-3.5 text-[10px] uppercase tracking-[0.16em]" style={{ ...mono, color: "#A8302A" }}>Get help now</p>
                <ul className="mt-1.5 space-y-1.5">
                  {group.urgent.map((s, i) => (
                    <li key={i} className="flex gap-2 text-[13px] font-medium leading-relaxed">
                      <span aria-hidden="true" className="pt-[7px]"><span className="block h-[4px] w-[4px] rounded-full" style={{ backgroundColor: "#CE4B44" }} /></span>
                      <span>{s}</span>
                    </li>
                  ))}
                </ul>
                <p className="pt-3 text-xs leading-relaxed opacity-70">{group.note}</p>
              </div>
            ))}
          </div>
        </section>

        {/* Cyanobacteria — independent of air quality */}
        <section className="mt-10">
          <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>The lake — unrelated to the air</h2>
          <div className="mt-3 rounded-[2px] p-4" style={{ ...card, borderLeft: "3px solid #4E7A6B" }}>
            <p className="text-sm leading-relaxed">
              A cyanobacteria bloom is present in Lake Billy Chinook. Toxin levels dropped below the recreational
              guideline for people but remain above the guideline for dogs, so the state's advice is to keep pets out
              of the water. No wading, no swimming, no drinking lake water.
            </p>
            <p className="pt-2.5 text-sm leading-relaxed">
              Rinse a dog with clean water immediately if he gets in, and keep wet towels and swimsuits out of reach —
              licking them is a real exposure route. Toxins can persist in water that looks clear, so appearance isn't
              reassurance.
            </p>
            <p className="pt-2.5 text-xs opacity-70">
              Current advisory status: 1-877-290-6767 · This does not move with the AQI above.
            </p>
          </div>
        </section>

        <p className="mt-9 text-[11px] leading-relaxed opacity-55">
          Culver has no ground monitor of its own; the nearest regulatory station is Madras, about ten miles north.
          Readings swing hard hour to hour during smoke events — the Madras station ranged from 51 to 290 within a
          single two-day window this week, which is why the spread figure matters as much as the headline.
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SmokeConditions />);
</script>

</body>
</html>

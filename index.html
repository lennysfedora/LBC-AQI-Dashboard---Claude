/* Weighted composite across every source that reported and counts. */
function composite(readings) {
  const used = SOURCES.filter(
    (s) => s.counts && readings[s.id] && typeof readings[s.id].aqi === "number"
  );
  if (used.length === 0) return null;

  const totalW = used.reduce((sum, s) => sum + s.weight, 0);
  const value = used.reduce((sum, s) => sum + readings[s.id].aqi * s.weight, 0) / totalW;

  const values = used.map((s) => readings[s.id].aqi);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const spread = max - min;
  const hasRegulatory = used.some((s) => s.tag === "Regulatory");

  let confidence;
  if (!hasRegulatory) confidence = "Low — no ground monitor reporting";
  else if (used.length < 2) confidence = "Low — single source";
  else if (spread <= 20) confidence = "High — sources agree closely";
  else if (spread <= 50) confidence = "Moderate — sources differ";
  else confidence = "Low — sources disagree sharply";

  return { value: Math.round(value), min, max, spread, count: used.length, confidence, totalW };
}

/* Background tint: the colour smoke-filtered daylight actually takes on. */
function formatRefreshedAt(d) {
  if (!d) return null;
  const datePart = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  const timePart = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  let tz = "";
  try {
    tz = new Intl.DateTimeFormat(undefined, { timeZoneName: "short" })
      .formatToParts(d)
      .find((p) => p.type === "timeZoneName")?.value || "";
  } catch (e) {}
  return `${datePart}, ${timePart}${tz ? ` ${tz}` : ""}`;
}

function airTint(aqi) {
  const t = Math.min(aqi, 320) / 320;
  const l = (a, b) => Math.round(a + (b - a) * t);
  return {
    background: `radial-gradient(ellipse 120% 80% at 50% 0%, rgb(${l(233,190)},${l(232,150)},${l(223,108)}) 0%, rgb(${l(214,150)},${l(212,112)},${l(199,74)}) 100%)`,
  };
}

/* Small sparkline. Renders nothing rather than inventing a shape. */
function Spark({ series, color }) {
  if (!Array.isArray(series) || series.length < 2) return null;
  const w = 132, h = 34, pad = 3;
  const max = Math.max(...series, 1);
  const min = Math.min(...series);
  const range = Math.max(max - min, 1);
  const pts = series
    .map((v, i) => {
      const x = pad + (i / (series.length - 1)) * (w - pad * 2);
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    })
    .join(" ");
  return (
    <svg width={w} height={h} role="img" aria-label={`Recent trend, ${min} to ${max}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.75" strokeLinejoin="round" strokeLinecap="round" />
      <circle
        cx={pad + (w - pad * 2)}
        cy={h - pad - ((series[series.length - 1] - min) / range) * (h - pad * 2)}
        r="2.6"
        fill={color}
      />
    </svg>
  );
}

              content:
                "Find the CURRENT air quality near Culver and Madras, Oregon (Cove Palisades State Park, Lake Billy " +
                "Chinook). Search each of these separately and report what each one says right now:\n" +
                "- airnow: AirNow / Oregon DEQ Madras ground monitor\n" +
                "- firesmoke: AirNow Fire and Smoke Map nearest reading\n" +
                "- deq: Oregon DEQ air quality map\n" +
                "- purpleair: PurpleAir sensors near Culver/Madras/Crooked River Ranch\n" +
                "- iqair: IQAir Culver\n" +
                "- weather: AccuWeather or similar weather-app AQI for Culver\n\n" +
                "Also find CURRENT WEATHER at the site: sky/precipitation conditions right now, whether rain or " +
                "thunderstorms are occurring or forecast today, whether there is lightning or a thunderstorm risk, " +
                "wind speed in mph and direction, relative humidity, and any active National Weather Service alert " +
                "such as a Red Flag Warning or severe thunderstorm watch. " +
                "Then find current temperature in Fahrenheit, any active air quality advisory, and the daily AQI " +
                "forecast plus high and low temperature in Fahrenheit for each of the next four days through Sunday. " +
                "If no AQI forecast has been published for a given day, return null for its aqi rather than " +
                "estimating one. Omit any source you cannot find a real number for — do not guess " +
                "or copy one source's value into another. Where recent hourly values are available include up to 8 " +
                "of them, oldest first, in `recent`.\n\n" +
                "Reply with ONLY a raw JSON object — no markdown, no code fences, no explanation before or after it. " +
                "Every word that isn't part of the JSON is wasted budget. Shape:\n" +
                '{"tempF": number|null, "updatedLabel": string, "advisory": string|null, ' +
                '"weather":{"conditions":string,"precip":string|null,"windMph":number|null,"windDir":string|null,' +
                '"humidity":number|null,"lightning":boolean,"alerts":string[]}, ' +
                '"forecast":[{"day":string,"date":string,"aqi":number|null,"hi":number|null,"lo":number|null,"sky":string|null}], ' +
                '"readings": {"<id>": {"aqi": number, "pm25": number|null, "updatedLabel": string, "recent": number[]|null}}}',
            },
          ],
        }),
      });

      if (!res.ok) throw new Error(`Search returned ${res.status}`);
      const json = await res.json();

      const text = (json.content || [])
        .filter((b) => b.type === "text")
        .map((b) => b.text)
        .join("\n");

      const start = text.indexOf("{");
      const end = text.lastIndexOf("}");
      if (start === -1 || end === -1) throw new Error("The search ran out of room before finishing — try again");

      const parsed = JSON.parse(text.slice(start, end + 1));
      const raw = parsed.readings || {};
      const clean = {};
      SOURCES.forEach((s) => {
        const r = raw[s.id];
        if (r && typeof r.aqi === "number" && !Number.isNaN(r.aqi)) {

            aqi: Math.round(r.aqi),
            pm25: typeof r.pm25 === "number" ? r.pm25 : null,
            updatedLabel: r.updatedLabel || "just now",
            recent: Array.isArray(r.recent) ? r.recent.filter((n) => typeof n === "number").slice(-8) : null,

        refreshedAt: new Date(),
        tempF: typeof parsed.tempF === "number" ? parsed.tempF : null,
        weather: parsed.weather

              precip: parsed.weather.precip || null,
              windMph: typeof parsed.weather.windMph === "number" ? Math.round(parsed.weather.windMph) : null,

      `}</style>

      <div className="mx-auto w-full max-w-2xl">

        <div className="flex flex-wrap items-baseline justify-between gap-x-4 gap-y-1 border-b pb-3" style={{ borderColor: "rgba(34,31,26,0.28)" }}>

          </p>
          <p className="text-[11px] leading-none opacity-70" style={mono}>
            {data.live ? "post-refresh" : "seeded baseline"}
          </p>
        </div>

        {/* Hero — weighted composite */}
        <div className="drift pt-7">
          <div className="flex items-end gap-5">
            <span
              className="block leading-[0.78] tabular-nums"
              style={{ ...cond, fontWeight: 700, fontSize: "clamp(5.5rem, 22vw, 10rem)", color: band.color, textShadow: "0 2px 0 rgba(255,255,255,0.25)" }}
            >
              {comp ? comp.value : "—"}
            </span>
            <div className="pb-2">
              <p className="text-[11px] uppercase tracking-[0.18em] opacity-70" style={mono}>
                Composite AQI
              </p>
              <p className="uppercase leading-[0.95]" style={{ ...cond, fontWeight: 600, fontSize: "clamp(1.35rem, 5.5vw, 2.1rem)", maxWidth: "9ch" }}>
                {band.label}
              </p>
            </div>
          </div>
          {comp && (
            <p className="pt-2 text-xs leading-relaxed opacity-75">
              Weighted across {comp.count} reporting {comp.count === 1 ? "source" : "sources"} · range {comp.min}–{comp.max} · {comp.confidence}
            </p>
          )}
        </div>

        {/* Scale with every source plotted — the spread made visible */}
        <div className="pt-6">
          <div className="relative h-8 w-full overflow-hidden rounded-[2px]">
            <div className="flex h-full w-full">
              {BANDS.map((b) => (
                <div key={b.label} style={{ backgroundColor: b.color, width: `${(b.span / 500) * 100}%` }} />
              ))}
            </div>
            {reporting.map((s) => (
              <div
                key={s.id}
                className="absolute top-0 h-full transition-all duration-700"
                style={{ left: `${Math.min(data.readings[s.id].aqi, 500) / 5}%`, transform: "translateX(-50%)" }}
                title={`${s.name}: ${data.readings[s.id].aqi}`}
              >
                <div className="mx-auto h-full w-[1.5px]" style={{ backgroundColor: "rgba(255,255,255,0.85)" }} />
              </div>
            ))}
            {comp && (
              <div
                className="absolute top-0 h-full transition-all duration-700"
                style={{ left: `${Math.min(comp.value, 500) / 5}%`, transform: "translateX(-50%)" }}
              >
                <div className="h-full w-[3px]" style={{ backgroundColor: "#221F1A" }} />
              </div>
            )}
          </div>
          <div className="flex justify-between pt-1.5 text-[10px] opacity-60" style={mono}>
            <span>0</span><span>100</span><span>200</span><span>300</span><span>500</span>
          </div>
          <p className="pt-1.5 text-[11px] opacity-60">
            Thin white marks are individual sources. The dark line is the composite.
          </p>
        </div>

        {/* Instruments */}
        <dl className="mt-6 grid grid-cols-2 gap-px overflow-hidden rounded-[2px] sm:grid-cols-3" style={{ backgroundColor: "rgba(34,31,26,0.22)" }}>
          {[
            { k: "Spread", v: comp ? `${comp.min}–${comp.max}` : "—", u: "AQI" },
            { k: "Temperature", v: data.tempF != null ? `${data.tempF}` : "—", u: "°F" },
            { k: "Sources reporting", v: comp ? `${comp.count}` : "0", u: `of ${SOURCES.filter((s) => s.counts).length}` },
          ].map((row) => (
            <div key={row.k} className="px-3.5 py-3" style={{ backgroundColor: "rgba(255,253,248,0.5)" }}>
              <dt className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>{row.k}</dt>
              <dd className="pt-0.5 leading-tight" style={{ ...cond, fontWeight: 600, fontSize: "1.5rem" }}>
                {row.v}
                {row.u && <span className="pl-1 text-[0.55em] opacity-60">{row.u}</span>}
              </dd>
            </div>
          ))}
        </dl>

        {/* Weather now */}
        {data.weather && (
          <div className="mt-3">
            <div className="grid grid-cols-2 gap-px overflow-hidden rounded-[2px] sm:grid-cols-4" style={{ backgroundColor: "rgba(34,31,26,0.22)" }}>
              <div className="col-span-2 px-3.5 py-3" style={{ backgroundColor: "rgba(255,253,248,0.5)" }}>
                <dt className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Conditions</dt>
                <dd className="pt-1 text-[13px] leading-snug">{data.weather.conditions || "—"}</dd>
                {data.weather.precip && (
                  <dd className="pt-1 text-[12px] leading-snug opacity-75">{data.weather.precip}</dd>
                )}
              </div>
              <div className="px-3.5 py-3" style={{ backgroundColor: "rgba(255,253,248,0.5)" }}>
                <dt className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Wind</dt>
                <dd className="pt-0.5 leading-tight" style={{ ...cond, fontWeight: 600, fontSize: "1.5rem" }}>
                  {data.weather.windMph != null ? data.weather.windMph : "—"}
                  <span className="pl-1 text-[0.5em] opacity-60">
                    mph{data.weather.windDir ? ` ${data.weather.windDir}` : ""}
                  </span>
                </dd>
              </div>
              <div className="px-3.5 py-3" style={{ backgroundColor: "rgba(255,253,248,0.5)" }}>
                <dt className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Humidity</dt>
                <dd className="pt-0.5 leading-tight" style={{ ...cond, fontWeight: 600, fontSize: "1.5rem" }}>
                  {data.weather.humidity != null ? data.weather.humidity : "—"}
                  <span className="pl-1 text-[0.5em] opacity-60">%</span>
                </dd>
              </div>
            </div>

            {data.weather.alerts?.length > 0 && (
              <div className="mt-2 space-y-1.5">
                {data.weather.alerts.map((a, i) => (
                  <p
                    key={i}
                    className="rounded-[2px] px-3 py-2 text-xs leading-relaxed"
                    style={{ backgroundColor: "rgba(223,138,60,0.15)", borderLeft: "3px solid #DF8A3C" }}
                  >
                    {a}
                  </p>
                ))}
              </div>
            )}

            {data.weather.lightning && (
              <p
                className="mt-2 rounded-[2px] px-3 py-2 text-xs leading-relaxed"
                style={{ backgroundColor: "rgba(206,75,68,0.15)", borderLeft: "3px solid #CE4B44" }}
              >
                <strong>Lightning risk.</strong> A tent gives no protection. If you hear thunder, get into a
                hard-topped vehicle and stay there until 30 minutes after the last rumble. Dry lightning is also how
                most of the fires around you started.
              </p>
            )}
          </div>
        )}

        <div className="mt-5 rounded-[2px] p-3.5" style={{ backgroundColor: "rgba(255,253,248,0.6)", border: "1px solid rgba(34,31,26,0.18)" }}>
          <div className="flex flex-wrap items-center justify-between gap-3">
            <div>
              <p className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>
                Refreshed as of
              </p>
              <p className="pt-0.5 leading-tight" style={{ ...cond, fontWeight: 600, fontSize: "1.05rem" }}>
                {refreshedLabel ? refreshedLabel : "Not yet — showing seeded baseline"}
              </p>
            </div>
            <button
              onClick={refreshAll}
              disabled={loading}
              className="focusable shrink-0 flex items-center gap-2.5 rounded-[2px] px-5 py-2.5 text-sm uppercase tracking-[0.14em] transition-opacity disabled:opacity-80"
              style={{ ...cond, fontWeight: 600, backgroundColor: "#2F4636", color: "#F2EFE6" }}
            >
              {loading && (
                <svg className="spin shrink-0" width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" stroke="#F2EFE6" strokeOpacity="0.3" strokeWidth="3" />
                  <path d="M21 12a9 9 0 0 0-9-9" stroke="#F2EFE6" strokeWidth="3" strokeLinecap="round" />
                </svg>
              )}
              <span>{loading ? "Refreshing everything…" : "Refresh all"}</span>
            </button>
          </div>
          <p className="pt-2.5 text-[11px] leading-relaxed opacity-65">
            Pulls every source below in one pass and updates the composite, temperature, weather, forecast, and
            recommendation together — never a partial update.
          </p>
        </div>

        {error && (
          <p className="mt-3 rounded-[2px] px-3.5 py-2.5 text-xs" style={{ backgroundColor: "rgba(206,75,68,0.14)", border: "1px solid rgba(206,75,68,0.4)" }}>
            {error}
          </p>
        )}

        {data.advisory && (
          <p className="mt-3 rounded-[2px] px-3.5 py-2.5 text-xs leading-relaxed" style={{ backgroundColor: "rgba(255,253,248,0.55)", borderLeft: "3px solid #CE4B44" }}>
            {data.advisory}
          </p>
        )}

        {/* Sources */}
        <section className="mt-10">
          <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>Sources</h2>
          <p className="pt-2 text-sm leading-relaxed">
            These routinely disagree by fifty points or more, and most of that isn't error — some report a smoothed
            multi-hour average, some the raw hour, some a model with no instrument behind it. Each row shows its
            current reading and its weight in the composite. Tap for method and caveats.
          </p>

          <div className="mt-4 overflow-hidden rounded-[2px]" style={{ border: "1px solid rgba(34,31,26,0.2)" }}>
            {SOURCES.map((s, i) => {
              const open = openSource === i;
              const r = data.readings[s.id];
              const rBand = r ? bandFor(r.aqi) : null;
              return (
                <div
                  key={s.id}
                  style={{
                    borderTop: i === 0 ? "none" : "1px solid rgba(34,31,26,0.16)",
                    backgroundColor: open ? "rgba(255,253,248,0.72)" : "rgba(255,253,248,0.45)",
                  }}
                >
                  <button
                    onClick={() => setOpenSource(open ? null : i)}
                    aria-expanded={open}
                    className="focusable flex w-full items-center gap-3 px-4 py-3 text-left"
                  >
                    <span
                      className="w-11 shrink-0 text-right tabular-nums leading-none"
                      style={{ ...cond, fontWeight: 700, fontSize: "1.6rem", color: rBand ? rBand.color : "rgba(34,31,26,0.3)" }}
                    >
                      {r ? r.aqi : "—"}
                    </span>
                    <span className="min-w-0 flex-1">
                      <span className="block truncate leading-tight" style={{ ...cond, fontWeight: 600, fontSize: "1.02rem" }}>
                        {s.name}
                      </span>
                      <span className="block pt-0.5 text-[10px] uppercase tracking-[0.1em] opacity-60" style={mono}>
                        {s.tag} · {s.counts ? `weight ${s.weight.toFixed(2)}` : "reference only"}
                      </span>
                    </span>
                    <span aria-hidden="true" className="shrink-0 text-lg leading-none transition-transform duration-200" style={{ transform: open ? "rotate(45deg)" : "none", opacity: 0.5 }}>
                      +
                    </span>
                  </button>

                  {open && (
                    <div className="px-4 pb-4">
                      <div className="flex flex-wrap items-end justify-between gap-3 rounded-[2px] px-3 py-2.5" style={{ backgroundColor: "rgba(34,31,26,0.05)" }}>
                        <div>
                          <p className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Current</p>
                          <p style={{ ...cond, fontWeight: 600, fontSize: "1.15rem" }}>
                            {r ? `${r.aqi} AQI` : "Not reporting"}
                            {r?.pm25 != null && <span className="pl-2 text-[0.7em] opacity-70">PM2.5 {r.pm25} µg/m³</span>}
                          </p>
                          <p className="pt-0.5 text-[11px] opacity-65" style={mono}>
                            {r ? `${r.updatedLabel} · ${s.distance}` : s.distance}
                          </p>
                        </div>
                        {r?.recent ? (
                          <Spark series={r.recent} color={rBand.color} />
                        ) : (
                          <p className="text-[11px] opacity-55" style={{ maxWidth: "16ch" }}>
                            No recent series published
                          </p>
                        )}
                      </div>

                      <p className="pt-3 text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Method</p>
                      <p className="pt-1 text-[13px] leading-relaxed">{s.method}</p>
                      <p className="pt-3 text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Considerations</p>
                      <p className="pt-1 text-[13px] leading-relaxed">{s.caveats}</p>

                      <a
                        href={s.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="focusable mt-3 inline-block rounded-[2px] px-3 py-1.5 text-[11px] uppercase tracking-[0.14em] no-underline"
                        style={{ ...mono, border: "1px solid #2F4636", color: "#2F4636" }}
                      >
                        Open live readings ↗
                      </a>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* How the composite is built */}
          <div className="mt-4 rounded-[2px]" style={card}>
            <button
              onClick={() => setShowMethod(!showMethod)}
              aria-expanded={showMethod}
              className="focusable flex w-full items-center justify-between gap-3 px-4 py-3 text-left"
            >
              <span className="text-[11px] uppercase" style={sectionLabel}>How the composite is calculated</span>
              <span aria-hidden="true" className="text-lg leading-none transition-transform duration-200" style={{ transform: showMethod ? "rotate(45deg)" : "none", opacity: 0.5 }}>+</span>
            </button>
            {showMethod && (
              <div className="px-4 pb-4 text-[13px] leading-relaxed">
                <p>
                  Each source carries a fixed weight set by how it measures and how close it sits to the site:
                  regulatory ground monitors at the top, blended monitor-plus-sensor maps just below, corrected
                  crowdsourced sensors in the middle, satellite models low, and global weather-app models lowest.
                  The headline number is the weighted mean of every source that reported.
                </p>
                <p className="pt-2.5">
                  Two feeds are marked reference only and excluded from the average: the Oregon DEQ map and aqicn both
                  republish the same AirNow instruments, and counting them would triple-weight one measurement while
                  making the sources look more unanimous than they are.
                </p>
                <p className="pt-2.5">
                  Confidence comes from the spread between sources and whether a regulatory monitor is among them. Wide
                  disagreement or no ground instrument reporting both push it down. A tight range with a real monitor in
                  the mix is the only way it reads High.
                </p>
                <p className="pt-2.5 opacity-75">
                  What this can't fix: every source describes somewhere other than your campsite, and averaging distant
                  readings doesn't make them local. Treat the composite as a better estimate than any single number,
                  not as a measurement of the air you'll be breathing.
                </p>
              </div>
            )}
          </div>
        </section>

        {/* Through Sunday */}
        {data.forecast?.length > 0 && (
          <section className="mt-9">
            <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>Through Sunday</h2>
            <div className="mt-3 space-y-2.5">
              {data.forecast.map((f) => (
                <div key={f.day} className="flex items-center gap-3">
                  <div className="w-14 shrink-0">
                    <p className="text-sm uppercase leading-none" style={mono}>{f.day}</p>
                    {f.date && <p className="pt-0.5 text-[10px] leading-none opacity-55" style={mono}>{f.date}</p>}
                  </div>

                  <div className="h-5 flex-1 overflow-hidden rounded-[2px]" style={{ backgroundColor: "rgba(34,31,26,0.1)" }}>
                    {f.aqi != null ? (
                      <div
                        className="h-full transition-all duration-700"
                        style={{ width: `${Math.min(f.aqi, 500) / 5}%`, backgroundColor: bandFor(f.aqi).color }}
                      />
                    ) : (
                      <div
                        className="h-full w-full"
                        style={{
                          backgroundImage:
                            "repeating-linear-gradient(45deg, rgba(34,31,26,0.09) 0 5px, transparent 5px 10px)",
                        }}
                      />
                    )}
                  </div>

                  <div className="w-[4.5rem] shrink-0 text-right">
                    <p className="leading-none tabular-nums" style={{ ...cond, fontWeight: 600, fontSize: "1.2rem" }}>
                      {f.aqi != null ? f.aqi : "—"}
                    </p>
                    <p className="pt-1 text-[11px] leading-none tabular-nums opacity-70" style={mono}>
                      {f.hi != null || f.lo != null
                        ? `${f.hi != null ? `${f.hi}°` : "–"}/${f.lo != null ? `${f.lo}°` : "–"}`
                        : "—"}
                    </p>
                    {f.sky && <p className="pt-1 text-[10px] leading-none opacity-55">{f.sky}</p>}
                  </div>
                </div>
              ))}
            </div>

            <p className="pt-3 text-xs leading-relaxed opacity-70">
              Highs and lows in °F. Daily AQI figures hide a nightly rebound — smoke thins for a few hours before
              dawn, then rebuilds, so the average flatters the day. Saturday's number comes from a partial hourly
              run that cuts off at midday, and no AQI forecast has been published for Sunday yet.
            </p>
          </section>
        )}

        {/* Assessment */}
        <section className="mt-10">
          <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>Assessment</h2>

          <div className="mt-3 rounded-[2px] p-4" style={{ ...card, borderLeft: `3px solid ${band.color}` }}>
            <div className="flex flex-wrap items-center gap-2">
              <span
                className="rounded-[2px] px-2 py-0.5 text-[10px] uppercase tracking-[0.14em]"
                style={{ ...mono, border: `1px solid ${band.color}`, color: band.color === "#DCC04A" ? "#8A7318" : band.color }}
              >
                {rec.call}
              </span>
              <span className="text-[10px] uppercase tracking-[0.14em] opacity-55" style={mono}>
                suggested call at {comp ? comp.value : "—"} AQI
              </span>
            </div>
            <p className="pt-2.5 text-sm font-medium leading-relaxed">{rec.verdict}</p>
            <p className="pt-2 text-sm leading-relaxed">{rec.reasoning}</p>
          </div>

          <div className="mt-3 grid gap-3 sm:grid-cols-5">
            <div className="rounded-[2px] p-4 sm:col-span-3" style={card}>
              <h3 className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Precautions on site</h3>
              <ul className="mt-2 space-y-2">
                {rec.ifYouGo.map((item, i) => (
                  <li key={i} className="flex gap-2 text-[13px] leading-relaxed">
                    <span aria-hidden="true" className="pt-[7px]">
                      <span className="block h-[4px] w-[4px] rounded-full" style={{ backgroundColor: band.color }} />
                    </span>
                    <span>{item}</span>
                  </li>
                ))}
              </ul>
            </div>

            <div className="rounded-[2px] p-4 sm:col-span-2" style={card}>
              <h3 className="text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>What would change this</h3>
              <p className="mt-2 text-[13px] leading-relaxed">{rec.wouldChange}</p>
              <p className="pt-3 text-xs leading-relaxed opacity-65">
                A judgement drawn from the composite above, not a reading off an instrument. The reasoning is laid out
                so it can be argued with on specifics.
              </p>
            </div>
          </div>
        </section>

        {/* Symptom monitoring */}
        <section className="mt-10">
          <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>What to watch for</h2>
          <div className="mt-3 grid gap-3 sm:grid-cols-2">
            {WATCH.map((group) => (
              <div key={group.who} className="rounded-[2px] p-4" style={card}>
                <h3 className="uppercase leading-none" style={{ ...cond, fontWeight: 600, fontSize: "1.1rem" }}>{group.who}</h3>
                <p className="pt-3 text-[10px] uppercase tracking-[0.16em] opacity-60" style={mono}>Early signs</p>
                <ul className="mt-1.5 space-y-1.5">
                  {group.early.map((s, i) => (
                    <li key={i} className="flex gap-2 text-[13px] leading-relaxed">
                      <span aria-hidden="true" className="pt-[7px]"><span className="block h-[4px] w-[4px] rounded-full" style={{ backgroundColor: "#DF8A3C" }} /></span>
                      <span>{s}</span>
                    </li>
                  ))}
                </ul>
                <p className="pt-3.5 text-[10px] uppercase tracking-[0.16em]" style={{ ...mono, color: "#A8302A" }}>Get help now</p>
                <ul className="mt-1.5 space-y-1.5">
                  {group.urgent.map((s, i) => (
                    <li key={i} className="flex gap-2 text-[13px] font-medium leading-relaxed">
                      <span aria-hidden="true" className="pt-[7px]"><span className="block h-[4px] w-[4px] rounded-full" style={{ backgroundColor: "#CE4B44" }} /></span>
                      <span>{s}</span>
                    </li>
                  ))}
                </ul>
                <p className="pt-3 text-xs leading-relaxed opacity-70">{group.note}</p>
              </div>
            ))}
          </div>
        </section>

        {/* Cyanobacteria — independent of air quality */}
        <section className="mt-10">
          <h2 className="text-[11px] uppercase opacity-70" style={sectionLabel}>The lake — unrelated to the air</h2>
          <div className="mt-3 rounded-[2px] p-4" style={{ ...card, borderLeft: "3px solid #4E7A6B" }}>
            <p className="text-sm leading-relaxed">
              A cyanobacteria bloom is present in Lake Billy Chinook. Toxin levels dropped below the recreational
              guideline for people but remain above the guideline for dogs, so the state's advice is to keep pets out
              of the water. No wading, no swimming, no drinking lake water.
            </p>
            <p className="pt-2.5 text-sm leading-relaxed">
              Rinse a dog with clean water immediately if he gets in, and keep wet towels and swimsuits out of reach —
              licking them is a real exposure route. Toxins can persist in water that looks clear, so appearance isn't
              reassurance.
            </p>
            <p className="pt-2.5 text-xs opacity-70">
              Current advisory status: 1-877-290-6767 · This does not move with the AQI above.
            </p>
          </div>
        </section>

        <p className="mt-9 text-[11px] leading-relaxed opacity-55">
          Culver has no ground monitor of its own; the nearest regulatory station is Madras, about ten miles north.
          Readings swing hard hour to hour during smoke events — the Madras station ranged from 51 to 290 within a
          single two-day window this week, which is why the spread figure matters as much as the headline.
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SmokeConditions />);
</script>

</body>
</html>
